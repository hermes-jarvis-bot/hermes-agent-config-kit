name: Watch upstream claude-code-config

on:
  schedule:
    - cron: "17 */12 * * *"
  workflow_dispatch:
    inputs:
      target_sha:
        description: "Optional exact upstream commit SHA"
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      TARGET_SHA: ${{ github.event.inputs.target_sha || '' }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Check upstream status
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          args=(--check)
          if [ -n "$TARGET_SHA" ]; then args+=(--target-sha "$TARGET_SHA"); fi
          python3 scripts/sync_upstream.py "${args[@]}" | tee /tmp/upstream-check.json
          changed=$(python3 -c "import json; print(str(json.load(open('/tmp/upstream-check.json'))['changed']).lower())")
          echo "changed=$changed" >> "$GITHUB_OUTPUT"
      - name: Sync upstream snapshot and generated artefacts
        if: steps.check.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          args=(--sync)
          if [ -n "$TARGET_SHA" ]; then args+=(--target-sha "$TARGET_SHA"); fi
          python3 scripts/sync_upstream.py "${args[@]}"
          python3 scripts/validate_output.py
      - name: Create or update sync PR
        if: steps.check.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          branch: sync/upstream-claude-code-config
          delete-branch: true
          title: "sync: update claude-code-config upstream snapshot"
          body-path: reports/upstream-sync/latest.md
          commit-message: "sync: update claude-code-config upstream snapshot"
          labels: upstream-sync, manual-review
