hooks/*:
  status: review
  type: hook
  risk: high
  notes:
    - Claude Code hook APIs do not map directly to Hermes plugins.
    - Treat as executable code requiring manual security review.

scripts/*:
  status: review
  type: script
  risk: high
  notes:
    - Executable upstream code is copied only as upstream snapshot data.
    - Port deliberately after review.

.claude-plugin/*:
  status: unsupported
  type: claude_plugin
  risk: medium
  notes:
    - Claude Code plugin descriptor has no direct Hermes equivalent yet.

.github/workflows/*:
  status: review
  type: github_workflow
  risk: high
  notes:
    - Upstream CI can execute arbitrary commands and must remain review-only.
    - Never copy upstream workflows into active adapter workflows automatically.

workflows/*.js:
  status: planned
  type: workflow
  risk: medium
  notes:
    - Candidate conversion target: Hermes skill plus script or scheduled protocol.
