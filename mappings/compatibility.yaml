rules/silent-failure-detection.md:
  status: supported
  target: hermes/skills/silent-failure-detection/SKILL.md
  type: rule_skill
  name: silent-failure-detection
  description: Detect when configured protections, jobs, hooks, services, or integrations silently fail despite appearing enabled.
  risk: medium

rules/system-verification-independent.md:
  status: supported
  target: hermes/skills/independent-verification/SKILL.md
  type: rule_skill
  name: independent-verification
  description: Verify control systems, monitors, schedulers, cleanup routines, and side-effect functions by behaviour, not by names or claims.
  risk: medium

rules/verify-at-consumer.md:
  status: supported
  target: hermes/skills/verify-at-consumer/SKILL.md
  type: rule_skill
  name: verify-at-consumer
  description: Verify integrations at the receiving side; sender logs, specs, and HTTP acknowledgements are not enough.
  risk: medium

hooks/*:
  status: review
  type: hook
  risk: high
  notes:
    - Claude Code hook APIs do not map directly to Hermes plugins.
    - Treat as executable code requiring manual security review.

scripts/*:
  status: review
  type: script
  risk: high
  notes:
    - Executable upstream code is copied only as upstream snapshot data.
    - Port deliberately after review.

.claude-plugin/*:
  status: unsupported
  type: claude_plugin
  risk: medium
  notes:
    - Claude Code plugin descriptor has no direct Hermes equivalent yet.

.github/workflows/*:
  status: review
  type: github_workflow
  risk: high
  notes:
    - Upstream CI can execute arbitrary commands and must remain review-only.
    - Never copy upstream workflows into active adapter workflows automatically.

workflows/*.js:
  status: planned
  type: workflow
  risk: medium
  notes:
    - Candidate conversion target: Hermes skill plus script or scheduled protocol.
