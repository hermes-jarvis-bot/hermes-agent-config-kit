<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>{{TITLE}} · Animated Pixel Cover</title>
<style>
  :root {
    --bg: #0b0812;
    --fg: #a896b4;
    --dim: #5a4e6a;
    --accent: #ffb4c8;
    --border: rgba(255,255,255,.06);
    --cover-w: 256px;
    --cover-h: 384px;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--fg);
    font-family: "JetBrains Mono", ui-monospace, Menlo, monospace;
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
  }
  .cover {
    width: var(--cover-w);
    display: flex; flex-direction: column;
  }
  .canvas-wrap {
    width: var(--cover-w);
    height: var(--cover-h);
    background: #000;
    border: 1px solid var(--border);
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,.6);
  }
  canvas {
    display: block;
    width: 100%; height: 100%;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }
  .meta { margin-top: 18px; padding: 0 4px; }
  .meta .num { font-size: 9px; letter-spacing: .3em; color: var(--dim); }
  .meta .title {
    font-size: 13px; letter-spacing: .2em; text-transform: uppercase;
    color: var(--accent); margin: 6px 0 4px;
  }
  .meta .symbol {
    font-size: 10px; letter-spacing: .25em; text-transform: uppercase;
    color: var(--fg);
  }
  .meta .year { margin-top: 8px; font-size: 9px; letter-spacing: .25em; color: var(--dim); }
</style>
</head>
<body>
<div class="cover">
  <div class="canvas-wrap"><canvas id="c1" width="64" height="96"></canvas></div>
  <div class="meta">
    <div class="num">{{NUMBER_LABEL}}</div>
    <div class="title">{{TITLE}}</div>
    <div class="symbol">{{SYMBOL}}</div>
    <div class="year">{{YEAR}} · loop {{LOOP_S}}s</div>
  </div>
</div>
<script>
// Common helpers
function setupCanvas(id) {
  const cv = document.getElementById(id);
  const ctx = cv.getContext('2d');
  ctx.imageSmoothingEnabled = false;
  return { cv, ctx, W: cv.width, H: cv.height };
}
function rect(ctx, x, y, w, h, c) { ctx.fillStyle = c; ctx.fillRect(x|0, y|0, w|0, h|0); }
function px(ctx, x, y, c) { ctx.fillStyle = c; ctx.fillRect(x|0, y|0, 1, 1); }
function hex(c) { const m = c.match(/#([0-9a-f]{6})/i); if (!m) return [0,0,0]; const v = parseInt(m[1],16); return [(v>>16)&255,(v>>8)&255,v&255]; }
function rgb(r,g,b) { const h = n => Math.max(0,Math.min(255,n|0)).toString(16).padStart(2,'0'); return '#'+h(r)+h(g)+h(b); }
function mix(a,b,t) { const A=hex(a),B=hex(b); return rgb(A[0]+(B[0]-A[0])*t, A[1]+(B[1]-A[1])*t, A[2]+(B[2]-A[2])*t); }
function hash(n) { const x = Math.sin(n*12.9898)*43758.5453; return x - Math.floor(x); }

// SCENE: replace this function with your own scene
function drawScene(ctx, W, H, t) {
  // t is in [0, 1) — derive everything from t
  // Background
  for (let y = 0; y < H; y++) {
    rect(ctx, 0, y, W, 1, mix('#0a0814', '#1a0e1c', y/H));
  }
  // Subject — example: a pulsing centered dot
  const cx = W / 2, cy = H / 2;
  const r = 4 + Math.sin(t * Math.PI * 2) * 2;
  for (let dy = -r; dy <= r; dy++) {
    for (let dx = -r; dx <= r; dx++) {
      if (dx*dx + dy*dy <= r*r) px(ctx, cx + dx, cy + dy, '#ffb4c8');
    }
  }
}

// Animation driver
window.addEventListener('load', () => {
  const { ctx, W, H } = setupCanvas('c1');
  const PERIOD_MS = 4000; // match meta.year loop_s
  const start = performance.now();
  function frame(now) {
    const t = ((now - start) % PERIOD_MS) / PERIOD_MS;
    drawScene(ctx, W, H, t);
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
});
</script>
</body>
</html>
